name: Crawl markets
run-name: Crawl ${{ inputs.request_id || 'scheduled' }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Request ID from the web UI
        required: false
        default: manual
      keyword:
        description: Search keyword
        required: true
        default: realforce
      keywords:
        description: Comma-separated search keywords
        required: false
        default: realforce
      markets:
        description: Comma-separated markets
        required: true
        default: joongna,bunjang,mercari
      sort:
        description: Sort order
        required: true
        type: choice
        options:
          - price-asc
          - price-desc
          - newest
        default: newest
      limit:
        description: Product limit per market
        required: true
        default: "50"
  schedule:
    - cron: "0 5,12,23 * * *"

permissions:
  contents: write

concurrency:
  group: crawl-markets
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      KEYWORD: ${{ inputs.keyword || 'realforce' }}
      KEYWORDS: ${{ inputs.keywords || inputs.keyword || 'realforce' }}
      MARKETS: ${{ inputs.markets || 'joongna,bunjang,mercari' }}
      SORT: ${{ inputs.sort || 'newest' }}
      LIMIT: ${{ inputs.limit || '50' }}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify runner Chrome
        run: google-chrome --version
      - name: Crawl products
        run: node crawl.js --keywords="$KEYWORDS" --markets="$MARKETS" --sort="$SORT" --limit="$LIMIT"
      - name: Commit crawled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet && exit 0
          CRAWLED_AT="$(TZ=Asia/Ho_Chi_Minh date '+%Y-%m-%d %H:%M:%S %Z')"
          git commit -m "chore: update crawled product data - ${CRAWLED_AT}"
          git push
