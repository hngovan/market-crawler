name: Crawl markets
run-name: Crawl ${{ inputs.request_id || 'scheduled' }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Request ID from the web UI
        required: false
        default: manual
      keyword:
        description: Search keyword
        required: true
        default: realforce
      markets:
        description: Comma-separated markets
        required: true
        default: joongna,mercari
      sort:
        description: Sort order
        required: true
        type: choice
        options:
          - price-asc
          - price-desc
          - newest
        default: price-asc
      limit:
        description: Product limit per market
        required: true
        default: "100"
  schedule:
    - cron: "0 23 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      KEYWORD: ${{ inputs.keyword || 'realforce' }}
      MARKETS: ${{ inputs.markets || 'joongna,mercari' }}
      SORT: ${{ inputs.sort || 'price-asc' }}
      LIMIT: ${{ inputs.limit || '100' }}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify runner Chrome
        run: google-chrome --version
      - name: Crawl products
        run: node crawl.js --keyword="$KEYWORD" --markets="$MARKETS" --sort="$SORT" --limit="$LIMIT"
